name: LidBoot

options:
  bundleIdPrefix: com.lidboot
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"
  generateEmptyDirectories: true
  developmentLanguage: en

# en is the source language; pt-PT ships translated (App/Localizable.xcstrings).
knownRegions:
  - en
  - pt-PT
  - Base

# ── Local Swift Package ──────────────────────────────────────────────────────
# Package.swift in this directory defines LidBootCore (the NVRAM logic, unit
# tested with `swift test` independently of the app target).
packages:
  LidBoot:
    path: .
  # Auto-update. Integrity comes from the EdDSA signature (SUPublicEDKey in
  # Info.plist), not from where the feed is hosted — which is why the appcast
  # and DMGs can live in a public repo while this one stays private.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  LidBoot:
    type: application
    platform: macOS
    # macOS 15 (Sequoia) is the floor because BootPreference does not exist
    # before it — a lower target would only let the app launch and immediately
    # disable itself.
    deploymentTarget: "15.0"

    sources:
      - path: App
        excludes:
          - Info.plist

    dependencies:
      - package: LidBoot
        product: LidBootCore
      - package: Sparkle
        product: Sparkle

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lidboot.LidBoot
        MARKETING_VERSION: "0.3.1"
        CURRENT_PROJECT_VERSION: "4"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: LidBoot.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 632VXL3W66
        ENABLE_HARDENED_RUNTIME: YES
        # Must stay NO: the sandbox blocks both the IO registry read and the
        # privileged nvram write. See LidBoot.entitlements.
        ENABLE_APP_SANDBOX: NO
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # A native test target over the same sources as the SwiftPM test target.
  # `swift test` is the fast path, but without this the Xcode scheme has nothing
  # to run and `xcodebuild test` reports success while testing nothing at all.
  LidBootTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/LidBootCoreTests
    dependencies:
      - package: LidBoot
        product: LidBootCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lidboot.LidBootTests
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES
        # @testable import needs this; it's the Debug default, but the tests are
        # only ever run in Debug so make it explicit.
        ENABLE_TESTABILITY: YES

schemes:
  LidBoot:
    build:
      targets:
        LidBoot: all
        LidBootTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      # Must not be empty: an empty list makes `xcodebuild test` report success
      # while running nothing at all.
      targets:
        - LidBootTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
